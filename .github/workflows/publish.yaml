name: publish

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Establish Versioning, Tags, and Labels
        id: vtl
        uses: mapped/action-vtl@latest
        with:
          baseVersion: 1.0.0
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          releasesBranch: master

      - name: Install build deps
        run: pip install poetry

      - name: Set version
        run: poetry version "${{ steps.vtl.outputs.ver_semVerNoMetaPyPA }}"

      - name: Build
        run: poetry build

      - name: Publish to fury
        shell: bash
        env:
          FURY_PUSH_TOKEN: ${{ secrets.FURY_PUSH_TOKEN }}
          VERSION: ${{ steps.vtl.outputs.ver_semVerNoMetaPyPA }}
        run: |
          set -euo pipefail
          if [ -z "${FURY_PUSH_TOKEN}" ]; then
            echo "::error::FURY_PUSH_TOKEN secret is not available to this repository."
            echo "::error::Set it via: gh secret set FURY_PUSH_TOKEN --repo mapped/betterproto"
            echo "::error::or have an org admin grant the mapped org secret access to this repo."
            exit 1
          fi
          for artifact in \
              "dist/betterproto-${VERSION}-py3-none-any.whl" \
              "dist/betterproto-${VERSION}.tar.gz"; do
            echo "Uploading ${artifact}..."
            curl --fail-with-body --show-error --silent \
              -F "package=@${artifact}" \
              "https://${FURY_PUSH_TOKEN}@push.fury.io/mapped/"
            echo
          done
